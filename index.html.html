<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VELO | Private Terminal</title>
<link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
<style>
  :root {
    --bg: #050608;
    --surface: #0a0c10;
    --card: #11141b;
    --gold: #c9a84c;
    --gold-dim: #7a6228;
    --text: #ccd6e0;
    --text-dim: #5c6d7e;
    --border: #1e2530;
    --green: #1db96a;
    --red: #d94040;
    --info: #4c82c9;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    outline: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* --- Header / Navigation --- */
  nav {
    height: 52px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--gold);
  }

  .logo span {
    display: none;
  }

  /* Toggle button style for mobile */
  #view-toggle {
    display: none;
    margin-left: 10px;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    background: var(--gold);
    color: #000;
  }

  .vault-display {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .vault-label {
    font-size: 9px;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .vault-amt {
    font-family: 'DM Mono', monospace;
    color: var(--gold);
    font-size: 18px;
    font-weight: 500;
  }

  /* --- Main Layout --- */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .chart-area {
    flex: 1;
    background: #000;
    border-right: 1px solid var(--border);
  }

  .chart-area iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .sidebar {
    width: 380px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 15px;
    scrollbar-width: none;
  }

  /* --- UI Components --- */
  .section {
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    margin-bottom: 15px;
  }

  .section-h {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 18px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
  }

  .tabs {
    display: flex;
    background: #000;
    padding: 4px;
    border-radius: 6px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 600;
    transition: 0.3s;
  }

  .tab.active {
    background: var(--border);
    color: var(--gold);
  }

  .input-group {
    margin-bottom: 15px;
  }

  .input-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  input {
    width: 100%;
    background: #050608;
    border: 1px solid var(--border);
    padding: 14px;
    color: #fff;
    font-family: 'DM Mono', monospace;
    border-radius: 6px;
    font-size: 14px;
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .btn-green {
    background: var(--green);
    color: #fff;
  }

  .btn-gold {
    background: var(--gold);
    color: #000;
  }

  .btn-red {
    background: var(--red);
    color: #fff;
  }

  .btn:hover {
    filter: brightness(1.1);
  }

  /* --- Wizard Styling --- */
  .wizard-step {
    animation: fadeIn 0.3s ease-in-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(5px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .qr-wrapper {
    background: #fff;
    padding: 12px;
    border-radius: 10px;
    width: 180px;
    margin: 0 auto 20px auto;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
  }

  .qr-wrapper img {
    width: 100%;
    height: auto;
    display: block;
  }

  .address-box {
    background: #000;
    border: 1px dashed var(--gold-dim);
    padding: 14px;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .address-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    word-break: break-all;
  }

  /* --- Portfolio Stats --- */
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  /* --- Modals --- */
  #terms-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    display: none;
    padding: 40px 20px;
    overflow-y: auto;
  }

  .terms-content {
    max-width: 500px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 8px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #000;
    padding: 12px 24px;
    border-radius: 4px;
    font-weight: 700;
    z-index: 2000;
    display: none;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
  }

  /* ── Mobile Responsive ────────────────────────────────────────────── */
  @media (max-width: 768px) {
    /* Show the toggle button */
    #view-toggle {
      display: inline-block;
    }

    /* Body scrolls on mobile */
    body {
      height: auto;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Nav */
    nav {
      padding: 0 14px;
    }

    /* Stack chart above panel for mobile, default to chart visible */
    .main {
      flex-direction: column;
      overflow: visible;
      height: auto;
    }

    /* Chart: fixed height strip at top */
    .chart-area {
      width: 100%;
      height: 260px;
      flex: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    /* Sidebar becomes full-width scrollable panel */
    .sidebar {
      width: 100%;
      flex: none;
      overflow-y: visible;
      padding: 12px;
    }

    /* Sections */
    .section { padding: 14px; margin-bottom: 12px; }
    .section-h { font-size: 9px; margin-bottom: 14px; }

    /* Buttons & inputs */
    .btn { padding: 15px; font-size: 12px; }
    input { padding: 13px; font-size: 15px; }

    /* QR code */
    .qr-wrapper { width: 140px; }

    /* Terms modal */
    .terms-content { padding: 20px; }
  }
</style>
</head>

</html>
